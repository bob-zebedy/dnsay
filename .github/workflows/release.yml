name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version='${{ inputs.tag }}'
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          ext=''
          [ "$GOOS" = 'windows' ] && ext='.exe'
          stage="dnsay-${{ steps.ver.outputs.version }}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${stage}"
          go build -trimpath -ldflags '-s -w' -o "dist/${stage}/dnsay${ext}" ./client
          go build -trimpath -ldflags '-s -w' -o "dist/${stage}/dnsany-server${ext}" ./server
          cp README.md LICENSE "dist/${stage}/"
          echo "stage=${stage}" >> "$GITHUB_ENV"

      - name: Package archive
        id: pkg
        run: |
          set -euo pipefail
          cd dist
          if [ "${{ matrix.goos }}" = 'windows' ]; then
            archive="${stage}.zip"
            zip -qr "${archive}" "${stage}"
          else
            archive="${stage}.tar.gz"
            tar -czf "${archive}" "${stage}"
          fi
          sha256sum "${archive}" > "${archive}.sha256"
          echo "archive=dist/${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${archive}.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dnsay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd artifacts
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*
